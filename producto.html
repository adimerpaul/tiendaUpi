<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productos | CRUD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #f8fafc, #e9f2ff);
    }
    .app-title {
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .clickable-row {
      cursor: pointer;
    }
    .clickable-row:hover {
      background-color: #f8f9fa;
    }
    .shadow-soft {
      box-shadow: 0 8px 30px rgba(13, 110, 253, 0.08);
    }
  </style>
</head>
<body>
  <main class="container py-4 py-md-5">
    <div class="row justify-content-center">
      <div class="col-12 col-xl-10">
        <div class="card border-0 shadow-soft mb-4">
          <div class="card-body p-3 p-md-4">
            <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2 mb-3">
              <h1 class="h3 app-title mb-0">CRUD de Productos</h1>
              <span class="badge text-bg-primary">API MVC + Bootstrap</span>
            </div>

            <div class="row g-3">
              <div class="col-12 col-md-6 col-lg-4">
                <label for="id" class="form-label">ID</label>
                <input id="id" type="number" min="1" class="form-control" placeholder="Para buscar, editar o eliminar" />
              </div>
              <div class="col-12 col-md-6 col-lg-4">
                <label for="nombre" class="form-label">Nombre</label>
                <input id="nombre" type="text" class="form-control" placeholder="Ej: Laptop" />
              </div>
              <div class="col-12 col-md-6 col-lg-2">
                <label for="precio" class="form-label">Precio</label>
                <input id="precio" type="number" min="0" step="0.01" class="form-control" placeholder="0.00" />
              </div>
              <div class="col-12 col-md-6 col-lg-2">
                <label for="cantidad" class="form-label">Cantidad</label>
                <input id="cantidad" type="number" min="0" step="1" class="form-control" placeholder="0" />
              </div>
              <div class="col-12 col-md-6 col-lg-4">
                <label for="marca" class="form-label">Marca</label>
                <input id="marca" type="text" class="form-control" placeholder="Ej: Dell" />
              </div>
            </div>

            <div class="d-grid d-sm-flex flex-wrap gap-2 mt-4">
              <button id="btnListar" class="btn btn-outline-primary">Listar</button>
              <button id="btnBuscar" class="btn btn-outline-secondary">Buscar por ID</button>
              <button id="btnCrear" class="btn btn-success">Crear</button>
              <button id="btnEditar" class="btn btn-warning">Editar</button>
              <button id="btnEliminar" class="btn btn-danger">Eliminar</button>
              <button id="btnLimpiar" class="btn btn-light border">Limpiar</button>
            </div>

            <div id="msg" class="alert d-none mt-3 mb-0" role="alert"></div>
          </div>
        </div>

        <div class="card border-0 shadow-soft">
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover table-striped align-middle mb-0">
                <thead class="table-dark">
                  <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Cantidad</th>
                    <th>Marca</th>
                  </tr>
                </thead>
                <tbody id="tablaBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const apiBase = 'api/productos';
    const $id = document.getElementById('id');
    const $nombre = document.getElementById('nombre');
    const $precio = document.getElementById('precio');
    const $cantidad = document.getElementById('cantidad');
    const $marca = document.getElementById('marca');
    const $msg = document.getElementById('msg');
    const $tablaBody = document.getElementById('tablaBody');

    function setMsg(text, isError = false) {
      $msg.textContent = text;
      $msg.className = `alert mt-3 mb-0 ${isError ? 'alert-danger' : 'alert-success'}`;
    }

    function limpiarFormulario() {
      $id.value = '';
      $nombre.value = '';
      $precio.value = '';
      $cantidad.value = '';
      $marca.value = '';
    }

    function renderRows(productos) {
      $tablaBody.innerHTML = '';
      productos.forEach(p => {
        const tr = document.createElement('tr');
        tr.className = 'clickable-row';
        tr.innerHTML = `
          <td>${p.id}</td>
          <td>${p.nombre}</td>
          <td>${p.precio}</td>
          <td>${p.cantidad}</td>
          <td>${p.marca}</td>
        `;
        tr.addEventListener('click', () => {
          $id.value = p.id;
          $nombre.value = p.nombre;
          $precio.value = p.precio;
          $cantidad.value = p.cantidad;
          $marca.value = p.marca;
        });
        $tablaBody.appendChild(tr);
      });
    }

    function getPayload() {
      return {
        nombre: $nombre.value.trim(),
        precio: Number($precio.value),
        cantidad: Number($cantidad.value),
        marca: $marca.value.trim()
      };
    }

    async function listar() {
      try {
        const res = await fetch(apiBase);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al listar');
        renderRows(Array.isArray(data) ? data : []);
        setMsg('Listado cargado');
      } catch (err) {
        setMsg(err.message, true);
      }
    }

    async function buscarPorId() {
      const id = $id.value.trim();
      if (!id) return setMsg('Escribe un ID', true);

      try {
        const res = await fetch(`${apiBase}/${id}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'No se pudo buscar');
        renderRows([data]);
        $nombre.value = data.nombre;
        $precio.value = data.precio;
        $cantidad.value = data.cantidad;
        $marca.value = data.marca;
        setMsg('Producto encontrado');
      } catch (err) {
        setMsg(err.message, true);
      }
    }

    async function crear() {
      const payload = getPayload();
      try {
        const res = await fetch(apiBase, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'No se pudo crear');
        setMsg(`Producto creado con ID ${data.id}`);
        limpiarFormulario();
        listar();
      } catch (err) {
        setMsg(err.message, true);
      }
    }

    async function editar() {
      const id = $id.value.trim();
      if (!id) return setMsg('Escribe un ID para editar', true);

      const payload = getPayload();
      try {
        const res = await fetch(`${apiBase}/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'No se pudo editar');
        setMsg(`Producto ${data.id} actualizado`);
        listar();
      } catch (err) {
        setMsg(err.message, true);
      }
    }

    async function eliminar() {
      const id = $id.value.trim();
      if (!id) return setMsg('Escribe un ID para eliminar', true);

      try {
        const res = await fetch(`${apiBase}/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'No se pudo eliminar');
        setMsg(data.mensaje || 'Producto eliminado');
        limpiarFormulario();
        listar();
      } catch (err) {
        setMsg(err.message, true);
      }
    }

    document.getElementById('btnListar').addEventListener('click', listar);
    document.getElementById('btnBuscar').addEventListener('click', buscarPorId);
    document.getElementById('btnCrear').addEventListener('click', crear);
    document.getElementById('btnEditar').addEventListener('click', editar);
    document.getElementById('btnEliminar').addEventListener('click', eliminar);
    document.getElementById('btnLimpiar').addEventListener('click', () => {
      limpiarFormulario();
      setMsg('Formulario limpio');
    });

    listar();
  </script>
</body>
</html>
